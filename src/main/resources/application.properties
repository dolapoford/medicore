spring.application.name=medicore

# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/medicore?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}


# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true



app.jwt.secret=${APP_JWT_SECRET}
app.jwt.issuer=medicore
app.jwt.access-token-ttl=15m
app.jwt.refresh-token-ttl=7d